[pytest]
# Scope collection to the real pytest suite. Keeps a plain `pytest` from wandering
# into helper/probe scripts elsewhere in the tree that match test-file naming but
# aren't pytest tests — e.g. honeypots/tools/*_probe.py (opens real sockets at import)
# or extras/tests/http/test_http_classifier.py (a standalone `python ...` regression
# script with its own __main__). Run those directly, not via pytest.
testpaths = tests
