services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped

  geoipupdate:
    image: ghcr.io/maxmind/geoipupdate
    environment:
      - GEOIPUPDATE_ACCOUNT_ID=${MAXMIND_ACCOUNT_ID}
      - GEOIPUPDATE_LICENSE_KEY=${MAXMIND_LICENSE_KEY}
      - 'GEOIPUPDATE_EDITION_IDS=GeoLite2-ASN GeoLite2-City'
      - GEOIPUPDATE_FREQUENCY=168
    volumes:
      - geoip-data:/usr/share/GeoIP
    restart: unless-stopped

  honeypot-monitor:
    image: ghcr.io/djkurlander/knock-knock:latest
    build: .  # Used when running: docker compose up --build
    command: python -u monitor.py
    environment:
      - REDIS_HOST=redis
    ports:
      - "21:21"
      - "22:22"
      - "23:23"
      - "25:25"
      - "80:80"
      - "443:443"
      - "587:587"
      - "3389:3389"
      - "445:445"
      - "5060:5060"
      - "5060:5060/udp"
    volumes:
      - ./data:/app/data
      - geoip-data:/usr/share/GeoIP:ro
    depends_on:
      - redis
      - geoipupdate
    restart: unless-stopped

  web:
    image: ghcr.io/djkurlander/knock-knock:latest
    build: .  # Used when running: docker compose up --build
    command:
      - sh
      - -c
      - |
        if [ "$$ENABLE_SSL" = 'true' ]; then
          exec python -m uvicorn main:app --host 0.0.0.0 --port $${WEB_PORT:-8080} \
            --ssl-keyfile /app/certs/key.pem --ssl-certfile /app/certs/cert.pem \
            --proxy-headers --forwarded-allow-ips='*' --workers 2;
        else
          exec python -m uvicorn main:app --host 0.0.0.0 --port $${WEB_PORT:-8080} \
            --proxy-headers --forwarded-allow-ips='*' --workers 2;
        fi
    environment:
      - REDIS_HOST=redis
    ports:
      - "${WEB_LISTEN:-0.0.0.0}:${WEB_PORT:-8080}:${WEB_PORT:-8080}"
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis-data:
  geoip-data:
